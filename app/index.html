<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>训练叙事 — Gym Training Narrative</title>
<style>
/* ========== CSS Reset & Variables ========== */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a14;--bg2:#12121f;--bg3:#1c1c30;--bg4:#262642;
  --accent:#00d4aa;--accent2:#00b894;--accent-dim:rgba(0,212,170,.12);
  --danger:#ff6b6b;--warn:#ffa502;--info:#5f9fff;--purple:#a78bfa;
  --text:#eef;--text2:#8888aa;--text3:#555570;
  --card:#161628;--radius:16px;
  --shadow:0 2px 16px rgba(0,0,0,0.5);
  --gradient:linear-gradient(135deg,#00d4aa 0%,#5f9fff 100%);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;overflow:hidden;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100%}

/* ========== Header ========== */
.header{padding:16px 20px 10px;flex-shrink:0;background:var(--bg);display:flex;align-items:center;justify-content:space-between}
.header .logo{font-size:18px;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .role-switch{display:flex;gap:2px;background:var(--bg3);border-radius:20px;padding:3px}
.header .role-btn{padding:6px 16px;border:none;border-radius:18px;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;background:transparent;color:var(--text2)}
.header .role-btn.active{background:var(--accent);color:var(--bg)}
.header .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-left:8px;flex-shrink:0}
.header .sync-dot.offline{background:var(--danger)}

/* ========== Main Content ========== */
.main{flex:1;overflow-y:auto;padding:0 16px 100px;-webkit-overflow-scrolling:touch}
.page{display:none}.page.active{display:block}

/* ========== Tab Bar ========== */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);display:flex;border-top:1px solid var(--bg3);z-index:100;padding:6px 0 calc(6px + env(safe-area-inset-bottom))}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--text3);transition:.2s;padding:5px 0;-webkit-tap-highlight-color:transparent}
.tab.active{color:var(--accent)}
.tab .t-icon{font-size:20px}.tab .t-label{font-size:10px;font-weight:500;letter-spacing:.3px}

/* ========== Cards ========== */
.card{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.03)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-title{font-size:16px;font-weight:700}
.card-badge{font-size:11px;padding:4px 12px;border-radius:12px;font-weight:600}
.badge-active{background:var(--accent-dim);color:var(--accent)}
.badge-achieved{background:rgba(167,139,250,.12);color:var(--purple)}
.badge-paused{background:rgba(255,165,2,.12);color:var(--warn)}

/* ========== Stats Grid ========== */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--card);border-radius:14px;padding:14px;text-align:center;border:1px solid rgba(255,255,255,.03)}
.stat .num{font-size:28px;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2}
.stat .label{font-size:11px;color:var(--text2);margin-top:3px}

/* ========== Progress Bar ========== */
.progress-bar{width:100%;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:8px 0}
.progress-bar .fill{height:100%;background:var(--gradient);border-radius:4px;transition:width .6s ease}

/* ========== Storyline Card ========== */
.storyline-card{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:14px;cursor:pointer;transition:transform .15s;border:1px solid rgba(255,255,255,.03);position:relative;overflow:hidden}
.storyline-card:active{transform:scale(.98)}
.storyline-card .sl-title{font-size:16px;font-weight:700;margin-bottom:4px}
.storyline-card .sl-target{font-size:13px;color:var(--text2);margin-bottom:10px}
.storyline-card .sl-stats{display:flex;gap:16px;font-size:12px;color:var(--text2);margin-top:8px}
.storyline-card .sl-stats span{display:flex;align-items:center;gap:4px}
.storyline-card .sl-milestone{font-size:12px;color:var(--accent);margin-top:6px}

/* ========== Timeline ========== */
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--bg3)}
.tl-item{position:relative;margin-bottom:20px;padding-left:12px}
.tl-item::before{content:'';position:absolute;left:-20px;top:6px;width:12px;height:12px;border-radius:50%;background:var(--bg3);border:2px solid var(--bg)}
.tl-item.achieved::before{background:var(--accent)}
.tl-item.current::before{background:var(--warn);box-shadow:0 0 8px rgba(255,165,2,.5)}
.tl-item .tl-date{font-size:11px;color:var(--text2)}
.tl-item .tl-title{font-size:14px;font-weight:600;margin:3px 0}
.tl-item .tl-desc{font-size:13px;color:var(--text2)}
.tl-item .tl-media{display:flex;gap:6px;margin-top:8px;overflow-x:auto}
.tl-item .tl-media img,.tl-item .tl-media video{width:80px;height:60px;object-fit:cover;border-radius:8px;border:1px solid var(--bg3)}

/* ========== Session Card ========== */
.session-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:transform .15s;border:1px solid rgba(255,255,255,.03)}
.session-card:active{transform:scale(.98)}
.session-card .sc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.session-card .sc-name{font-weight:600}
.session-card .sc-badge{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600}
.session-card .sc-badge.completed{background:rgba(0,212,170,.1);color:var(--accent)}
.session-card .sc-badge.planned{background:rgba(255,165,2,.1);color:var(--warn)}
.session-card .sc-badge.in_progress{background:rgba(95,159,255,.1);color:var(--info)}
.session-card .sc-meta{font-size:12px;color:var(--text2);display:flex;gap:12px}
.session-card .sc-fragments{font-size:11px;color:var(--info);margin-top:4px}

/* ========== Media Upload Area ========== */
.upload-area{border:2px dashed var(--bg4);border-radius:14px;padding:24px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:14px}
.upload-area:hover{border-color:var(--accent);background:var(--accent-dim)}
.upload-area .ua-icon{font-size:32px;margin-bottom:8px}
.upload-area .ua-text{font-size:14px;color:var(--text2)}
.upload-area .ua-hint{font-size:11px;color:var(--text3);margin-top:4px}

/* ========== Media Grid ========== */
.media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.media-thumb{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;cursor:pointer}
.media-thumb img,.media-thumb video{width:100%;height:100%;object-fit:cover}
.media-thumb .mt-badge{position:absolute;bottom:4px;right:4px;font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(0,0,0,.7);color:#fff}
.media-thumb .mt-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:24px;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.5)}

/* ========== Form ========== */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 14px;border:1px solid var(--bg4);border-radius:10px;background:var(--bg2);color:var(--text);font-size:14px;transition:.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:70px}

/* ========== Buttons ========== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--gradient);color:#fff}
.btn-secondary{background:var(--bg3);color:var(--text)}
.btn-outline{background:transparent;border:1px solid var(--bg4);color:var(--text2)}
.btn-danger{background:var(--danger);color:#fff}
.btn-full{width:100%}
.btn-sm{padding:7px 14px;font-size:12px}

/* ========== Section Title ========== */
.section-title{font-size:13px;font-weight:600;color:var(--text2);letter-spacing:.5px;margin:20px 0 10px;display:flex;align-items:center;gap:8px}

/* ========== Empty State ========== */
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-state .es-icon{font-size:48px;margin-bottom:12px;opacity:.5}
.empty-state .es-title{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--text)}
.empty-state .es-desc{font-size:13px;line-height:1.6}

/* ========== Modal ========== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:20px}
.modal .modal-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 16px}
.modal .modal-title{font-size:18px;font-weight:700;margin-bottom:16px}

/* ========== Chart Container ========== */
.chart-container{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:14px;border:1px solid rgba(255,255,255,.03)}
.chart-container canvas{width:100%!important;height:200px!important}
.mini-chart{height:60px;display:flex;align-items:flex-end;gap:3px;margin:8px 0}
.mini-chart .bar{flex:1;background:var(--accent);border-radius:3px 3px 0 0;min-height:4px;transition:height .3s}

/* ========== Toast ========== */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.success{background:rgba(0,212,170,.9);color:#fff}
.toast.error{background:rgba(255,107,107,.9);color:#fff}
.toast.info{background:rgba(95,159,255,.9);color:#fff}

/* ========== Prediction Card (Member View) ========== */
.prediction-card{background:linear-gradient(135deg,rgba(0,212,170,.08),rgba(95,159,255,.08));border:1px solid rgba(0,212,170,.15);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.prediction-card .pc-title{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:8px}
.prediction-card .pc-body{font-size:13px;color:var(--text);line-height:1.7}
.prediction-card .pc-highlight{color:var(--accent);font-weight:700;font-size:18px}

/* ========== Encouragement Banner ========== */
.encourage-banner{background:var(--gradient);border-radius:var(--radius);padding:20px;margin-bottom:14px;text-align:center;color:#fff}
.encourage-banner .eb-emoji{font-size:36px;margin-bottom:8px}
.encourage-banner .eb-text{font-size:15px;font-weight:600;line-height:1.5}
.encourage-banner .eb-sub{font-size:12px;opacity:.8;margin-top:6px}

/* ========== Loading ========== */
.loading{display:flex;align-items:center;justify-content:center;padding:40px}
.spinner{width:24px;height:24px;border:3px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ========== Scrollbar ========== */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="logo">训练叙事</div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="role-switch">
        <button class="role-btn active" data-role="coach" onclick="switchRole('coach')">教练</button>
        <button class="role-btn" data-role="member" onclick="switchRole('member')">学员</button>
      </div>
      <div class="sync-dot" id="syncDot" title="数据同步状态"></div>
    </div>
  </div>

  <!-- Main -->
  <div class="main" id="mainContent">
    <!-- ======= Coach Pages ======= -->

    <!-- Coach: Dashboard -->
    <div class="page active" id="page-coach-dashboard">
      <div class="stats" id="coachStats"></div>
      <div class="section-title">📋 学员管理</div>
      <div id="memberList"></div>
      <div class="section-title">⚡ 最近课程</div>
      <div id="recentSessions"></div>
    </div>

    <!-- Coach: Storylines -->
    <div class="page" id="page-coach-storylines">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="font-size:18px;font-weight:700">训练主线</div>
        <button class="btn btn-primary btn-sm" onclick="showCreateStoryline()">+ 新建主线</button>
      </div>
      <div id="storylineList"></div>
    </div>

    <!-- Coach: Record (Fragment Capture) -->
    <div class="page" id="page-coach-record">
      <div style="font-size:18px;font-weight:700;margin-bottom:16px">📱 碎片录入</div>
      <div class="form-group">
        <label>选择课程</label>
        <select id="recordSessionSelect" onchange="loadSessionFragments()">
          <option value="">— 选择进行中的课程 —</option>
        </select>
      </div>
      
      <!-- Upload Area -->
      <div class="upload-area" id="uploadArea" onclick="triggerUpload()">
        <div class="ua-icon">📸🎥🎙</div>
        <div class="ua-text">拍照 · 录视频 · 录音 · 拍板书</div>
        <div class="ua-hint">课中随手拍，课后 Agent 帮你整理</div>
      </div>
      <input type="file" id="fileInput" accept="image/*,video/*,audio/*" multiple hidden onchange="handleFileUpload(event)">
      
      <!-- Quick Text Note -->
      <div class="form-group">
        <label>💬 快速备注</label>
        <div style="display:flex;gap:8px">
          <textarea id="quickNote" placeholder="深蹲85×10三组完成，状态不错..." rows="2" style="flex:1"></textarea>
          <button class="btn btn-primary" style="align-self:flex-end" onclick="addTextFragment()">记</button>
        </div>
      </div>
      
      <!-- Fragment List -->
      <div class="section-title">📦 本次碎片 (<span id="fragmentCount">0</span>)</div>
      <div id="fragmentList"></div>
      
      <!-- Assemble Button -->
      <button class="btn btn-primary btn-full" id="assembleBtn" style="margin-top:16px;display:none" onclick="assembleSession()">
        🧩 课后拼凑 — Agent 整理本次训练
      </button>
    </div>

    <!-- Coach: Session Detail -->
    <div class="page" id="page-coach-session-detail">
      <div id="sessionDetailContent"></div>
    </div>

    <!-- Coach: Storyline Detail -->
    <div class="page" id="page-coach-storyline-detail">
      <div id="storylineDetailContent"></div>
    </div>

    <!-- ======= Member Pages ======= -->

    <!-- Member: Dashboard (Goal Progress) -->
    <div class="page" id="page-member-dashboard">
      <div id="memberEncourage"></div>
      <div id="memberGoalCards"></div>
      <div class="section-title">📅 我的训练</div>
      <div id="memberSessionList"></div>
    </div>

    <!-- Member: Storyline View -->
    <div class="page" id="page-member-storyline">
      <div id="memberStorylineContent"></div>
    </div>

    <!-- Member: Media Gallery -->
    <div class="page" id="page-member-media">
      <div style="font-size:18px;font-weight:700;margin-bottom:16px">📸 训练回忆</div>
      <div class="media-grid" id="memberMediaGrid"></div>
    </div>
  </div>

  <!-- Tab Bar: Coach -->
  <div class="tab-bar" id="tabbar-coach">
    <div class="tab active" onclick="switchTab('coach-dashboard')"><div class="t-icon">📊</div><div class="t-label">总览</div></div>
    <div class="tab" onclick="switchTab('coach-storylines')"><div class="t-icon">🎯</div><div class="t-label">主线</div></div>
    <div class="tab" onclick="switchTab('coach-record')"><div class="t-icon">📱</div><div class="t-label">录入</div></div>
  </div>

  <!-- Tab Bar: Member -->
  <div class="tab-bar" id="tabbar-member" style="display:none">
    <div class="tab active" onclick="switchTab('member-dashboard')"><div class="t-icon">🏋️</div><div class="t-label">目标</div></div>
    <div class="tab" onclick="switchTab('member-storyline')"><div class="t-icon">📈</div><div class="t-label">进展</div></div>
    <div class="tab" onclick="switchTab('member-media')"><div class="t-icon">📸</div><div class="t-label">回忆</div></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const CONFIG = {
  KV_BASE: 'https://api.cuige.xin/v1/store/gym-session',
  KV_KEY: 'gym_data',
  STORE_TOKEN: '__STORE_TOKEN__',
  FC_BASE: 'https://gym-med-service-wetefapcun.cn-shanghai.fcapp.run',
  OSS_BUCKET: 'pubhtml-files',
  OSS_REGION: 'oss-cn-hangzhou',
};

// ============================================================
// STATE
// ============================================================
let STATE = {
  role: 'coach',       // 'coach' | 'member'
  currentPage: 'coach-dashboard',
  data: null,          // Full KV data
  loading: false,
  selectedSessionId: null,
  selectedStorylineId: null,
  selectedMemberId: null,
  pendingFragments: [], // In-memory fragments before upload
};

// ============================================================
// DATA LAYER
// ============================================================
async function loadData() {
  try {
    setSyncStatus(true);
    const res = await fetch(`${CONFIG.KV_BASE}?key=${CONFIG.KV_KEY}`);
    const json = await res.json();
    STATE.data = json.value || createEmptyData();
    // Ensure new fields exist
    if (!STATE.data.storylines) STATE.data.storylines = [];
    if (!STATE.data.fragments) STATE.data.fragments = [];
    if (!STATE.data.mediaAssets) STATE.data.mediaAssets = [];
    render();
    return STATE.data;
  } catch (e) {
    console.error('Load data failed:', e);
    setSyncStatus(false);
    showToast('数据加载失败', 'error');
    return null;
  }
}

async function saveData() {
  try {
    const res = await fetch(CONFIG.KV_BASE, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${CONFIG.STORE_TOKEN}`
      },
      body: JSON.stringify({ key: CONFIG.KV_KEY, value: STATE.data })
    });
    if (!res.ok) throw new Error(`Save failed: ${res.status}`);
    setSyncStatus(true);
    return true;
  } catch (e) {
    console.error('Save data failed:', e);
    setSyncStatus(false);
    showToast('数据保存失败', 'error');
    return false;
  }
}

function createEmptyData() {
  return {
    members: [], coaches: [], sessions: [], plans: [],
    decisionPoints: [], setLogs: [], exerciseOutcomes: [],
    feedbacks: [], voiceSegments: [],
    storylines: [], fragments: [], mediaAssets: []
  };
}

function uuid() {
  return crypto.randomUUID ? crypto.randomUUID() : 
    'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
}

function now() { return new Date().toISOString(); }

// ============================================================
// RENDERING ENGINE
// ============================================================
function render() {
  if (!STATE.data) return;
  if (STATE.role === 'coach') {
    renderCoachDashboard();
    renderCoachStorylines();
    renderRecordPage();
  } else {
    renderMemberDashboard();
    renderMemberStoryline();
    renderMemberMedia();
  }
}

// --- Coach Dashboard ---
function renderCoachDashboard() {
  const d = STATE.data;
  const totalSessions = d.sessions.length;
  const completed = d.sessions.filter(s => s.status === 'completed').length;
  const totalStorylines = (d.storylines || []).filter(s => s.status === 'active').length;
  
  document.getElementById('coachStats').innerHTML = `
    <div class="stat"><div class="num">${d.members.length}</div><div class="label">学员</div></div>
    <div class="stat"><div class="num">${completed}</div><div class="label">已完成课</div></div>
    <div class="stat"><div class="num">${totalStorylines}</div><div class="label">活跃主线</div></div>
  `;
  
  // Member list
  const memberHtml = d.members.map(m => {
    const sessions = d.sessions.filter(s => s.member_id === m.id);
    const lastSession = sessions.sort((a,b) => (b.scheduled_at||'').localeCompare(a.scheduled_at||''))[0];
    const activeStorylines = (d.storylines || []).filter(sl => sl.member_id === m.id && sl.status === 'active');
    const warnings = getWarnings(m, sessions, d);
    
    return `<div class="session-card" onclick="STATE.selectedMemberId='${m.id}';showMemberDetail('${m.id}')">
      <div class="sc-top">
        <span class="sc-name">${m.name}</span>
        <span class="sc-badge ${sessions.length > 0 ? 'completed' : 'planned'}">${sessions.length} 节课</span>
      </div>
      <div class="sc-meta">
        ${activeStorylines.length > 0 ? `<span>🎯 ${activeStorylines.map(s=>s.title).join(', ')}</span>` : ''}
        ${lastSession ? `<span>最近: ${formatDate(lastSession.scheduled_at)}</span>` : '<span>暂无课程</span>'}
      </div>

// --- Fragment Capture ---
function triggerUpload() {
  const sessionId = document.getElementById('recordSessionSelect').value;
  if (!sessionId) { showToast('请先选择课程', 'info'); return; }
  document.getElementById('fileInput').click();
}

async function handleFileUpload(event) {
  const files = event.target.files;
  if (!files.length) return;
  const sessionId = document.getElementById('recordSessionSelect').value;
  if (!sessionId) return;
  
  for (const file of files) {
    const mediaType = file.type.startsWith('video') ? 'video' : 
                      file.type.startsWith('audio') ? 'audio' : 'image';
    const fragmentType = mediaType === 'image' ? 'photo' : 
                         mediaType === 'video' ? 'exercise_video' : 'voice_memo';
    
    // Create media asset record
    const mediaAsset = {
      id: uuid(),
      session_id: sessionId,
      media_type: mediaType,
      oss_bucket: CONFIG.OSS_BUCKET,
      oss_key: `gym-media/${sessionId}/${mediaType}/${Date.now()}_${file.name}`,
      oss_url: '', // Will be set after upload
      caption: '',
      file_size_bytes: file.size,
      mime_type: file.type,
      processing_status: 'uploaded',
      uploaded_at: now()
    };
    
    // Create fragment record
    const fragment = {
      id: uuid(),
      session_id: sessionId,
      fragment_type: fragmentType,
      media_asset_id: mediaAsset.id,
      extracted_data: {},
      extraction_confidence: 0,
      auto_tags: [],
      status: 'raw',
      captured_at: now()
    };
    
    // Try to upload to OSS via FC (if configured)
    if (CONFIG.FC_BASE) {
      try {
        const signRes = await fetch(`${CONFIG.FC_BASE}/sign-upload`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fileName: file.name,
            contentType: file.type,
            sessionId,
            mediaType
          })
        });
        const signData = await signRes.json();
        
        // Upload to OSS
        await fetch(signData.uploadUrl, {
          method: 'PUT',
          headers: { 'Content-Type': file.type },
          body: file
        });
        
        mediaAsset.oss_key = signData.objectKey;
        mediaAsset.oss_url = signData.accessUrl;
        showToast(`📎 ${file.name} 上传成功`, 'success');
      } catch (e) {
        console.warn('OSS upload failed, storing locally:', e);
        // Fallback: store as data URL for MVP
        const dataUrl = await fileToDataUrl(file);
        mediaAsset.oss_url = dataUrl;
        mediaAsset.processing_status = 'uploaded';
      }
    } else {
      // No FC configured — store as data URL (MVP fallback)
      const dataUrl = await fileToDataUrl(file);
      mediaAsset.oss_url = dataUrl;
    }
    
    STATE.data.mediaAssets.push(mediaAsset);
    STATE.data.fragments.push(fragment);
  }
  
  await saveData();
  render();
  showToast(`📦 ${files.length} 个碎片已记录`, 'success');
  event.target.value = ''; // Reset input
}

// --- Assemble Session (Agent Simulation) ---
async function assembleSession() {
  const sessionId = document.getElementById('recordSessionSelect').value;
  if (!sessionId) return;
  
  const fragments = STATE.data.fragments.filter(f => f.session_id === sessionId && f.status === 'raw');
  if (fragments.length === 0) { showToast('没有待处理的碎片', 'info'); return; }
  
  showToast('🧩 正在拼凑训练记录...', 'info');
  
  // Simulate Agent assembly: extract structure from text fragments
  const textFragments = fragments.filter(f => f.raw_text);
  const mediaFragments = fragments.filter(f => f.media_asset_id);
  
  let assembledExercises = [];
  let assembledDecisions = [];
  
  textFragments.forEach(f => {
    const parsed = parseTrainingText(f.raw_text);
    assembledExercises.push(...parsed.exercises);
    assembledDecisions.push(...parsed.decisions);
    f.extracted_data = parsed;
    f.extraction_confidence = 0.7;
    f.status = 'processed';
  });
  
  mediaFragments.forEach(f => {
    f.status = 'processed';
  });
  
  // Create/update session data
  const session = STATE.data.sessions.find(s => s.id === sessionId);
  if (session) {
    session.status = 'completed';
    session.completed_at = now();
    
    // Update fragment assembly status
    session.fragment_assembly_status = 'assembled';
    session.fragment_count = fragments.length;
  }
  
  // Create plan if exercises found
  if (assembledExercises.length > 0) {
    const existingPlan = STATE.data.plans.find(p => p.session_id === sessionId);
    const planData = {
      exercises: assembledExercises.map((ex, i) => ({
        order: i + 1,
        name: ex.name,
        sets: ex.sets,
        reps: ex.reps,
        weight_kg: ex.weight,
        rest_seconds: 90,
        notes: ex.notes || ''
      }))
    };
    
    if (existingPlan) {
      existingPlan.coach_final = planData;
    } else {
      STATE.data.plans.push({
        id: uuid(),
        session_id: sessionId,
        agent_draft: planData,
        coach_final: planData,
        diff_summary: { added: [], removed: [], modified: [] },
        created_at: now()
      });
    }
  }
  
  // Add decision points
  assembledDecisions.forEach(dp => {
    STATE.data.decisionPoints.push({
      id: uuid(),
      session_id: sessionId,
      ...dp,
      recorded_at: now()
    });
  });
  
  // Auto-link to storylines
  const storylines = STATE.data.storylines.filter(sl => sl.status === 'active' && sl.member_id === session?.member_id);
  storylines.forEach(sl => {
    const keyExercises = sl.key_exercises || [];
    const matchedExercises = assembledExercises.filter(ex => 
      keyExercises.some(ke => {
        const a = ex.name.replace(/[\s\-]/g, '');
        const b = ke.replace(/[\s\-]/g, '');
        return a.includes(b) || b.includes(a) || 
          a.split('').filter(c => b.includes(c)).length >= Math.min(a.length, b.length) * 0.6;
      })
    );
    
    if (matchedExercises.length > 0) {
      // Add data points
      matchedExercises.forEach(ex => {
        sl.progress_data_points = sl.progress_data_points || [];
        sl.progress_data_points.push({
          session_id: sessionId,
          date: new Date().toISOString().slice(0, 10),
          exercise: ex.name,
          metric_name: 'weight_kg',
          metric_value: ex.weight || 0
        });
      });
      
      // Link media
      mediaFragments.forEach(f => {
        const ma = STATE.data.mediaAssets.find(m => m.id === f.media_asset_id);
        if (ma) ma.storyline_id = sl.id;
      });
      
      sl.updated_at = now();
    }
  });
  
  // Mark fragments as merged
  fragments.forEach(f => f.status = 'merged');
  
  await saveData();
  render();
  showToast('✅ 训练记录已拼凑完成！', 'success');
}

async function createStoryline() {
  const memberId = document.getElementById('sl-member').value;
  const title = document.getElementById('sl-title').value.trim();
  const target = document.getElementById('sl-target').value.trim();
  if (!title || !target) { showToast('请填写标题和目标', 'info'); return; }
  
  const milestonesText = document.getElementById('sl-milestones').value.trim();
  const milestones = milestonesText.split('\n').filter(l => l.trim()).map((line, i) => ({
    order: i + 1,
    description: line.trim(),
    status: i === 0 ? 'in_progress' : 'not_started',
    achieved_at: null,
    session_id: null
  }));
  
  const exercisesText = document.getElementById('sl-exercises').value.trim();
  const keyExercises = exercisesText ? exercisesText.split(/[,，]/).map(s => s.trim()).filter(Boolean) : [];
  
  const coachId = STATE.data.coaches.length > 0 ? STATE.data.coaches[0].id : uuid();
  
  const storyline = {
    id: uuid(),
    member_id: memberId,
    coach_id: coachId,
    title,
    storyline_type: document.getElementById('sl-type').value,
    target_description: target,
    measurable_criteria: document.getElementById('sl-criteria').value.trim(),
    target_date: document.getElementById('sl-date').value || null,
    baseline_description: document.getElementById('sl-baseline').value.trim(),
    key_exercises: keyExercises,
    expected_sessions_per_week: 2,
    milestones,
    progress_data_points: [],
    trend: 'unknown',
    projected_target_date: null,
    status: 'active',
    created_at: now(),
    updated_at: now()
  };
  
  STATE.data.storylines.push(storyline);
  await saveData();
  closeModal();
  render();
  showToast('🎯 训练主线已创建！', 'success');
}

function updateMilestone(storylineId) {
  const sl = STATE.data.storylines.find(s => s.id === storylineId);
  if (!sl) return;
  
  const milestones = sl.milestones || [];
  const currentIdx = milestones.findIndex(ms => ms.status === 'in_progress');

    ${milestones.map((ms, i) => `
      <div class="card" style="padding:12px;margin-bottom:8px;border-left:4px solid ${ms.status === 'achieved' ? 'var(--accent)' : ms.status === 'in_progress' ? 'var(--warn)' : 'var(--bg4)'}">

          <span style="font-size:14px;font-weight:600">${ms.description}</span>
          ${ms.status !== 'achieved' ? `<button class="btn btn-sm ${ms.status === 'in_progress' ? 'btn-primary' : 'btn-outline'}" 
            onclick="markMilestoneAchieved('${storylineId}', ${i})">
            ${ms.status === 'in_progress' ? '✅ 达成!' : '设为进行中'}
          </button>` : '<span style="color:var(--accent)">✅</span>'}
        </div>
      </div>
    `).join('')}
  `;
  openModal();
}

async function markMilestoneAchieved(storylineId, milestoneIdx) {
  const sl = STATE.data.storylines.find(s => s.id === storylineId);
  if (!sl) return;
  
  const ms = sl.milestones[milestoneIdx];
  if (ms.status === 'in_progress') {
    ms.status = 'achieved';
    ms.achieved_at = new Date().toISOString().slice(0, 10);
    // Advance next milestone
    const next = sl.milestones.find(m => m.status === 'not_started');
    if (next) next.status = 'in_progress';
    // Check if all achieved
    if (sl.milestones.every(m => m.status === 'achieved')) {
      sl.status = 'achieved';
    }
  } else if (ms.status === 'not_started') {
    // Reset current in_progress
    sl.milestones.forEach(m => { if (m.status === 'in_progress') m.status = 'not_started'; });
    ms.status = 'in_progress';
  }
  
  sl.updated_at = now();
  await saveData();
  closeModal();
  showStorylineDetail(storylineId);
  render();
  showToast('🏆 里程碑已更新！', 'success');
}

// ============================================================
// TEXT PARSING (Simple NLU)
// ============================================================
function parseTrainingText(text) {
  const exercises = [];
  const decisions = [];
  
  // Split by Chinese commas/periods/semicolons into segments, then parse each
  const segments = text.split(/[,，;；。！!]+/).map(s => s.trim()).filter(Boolean);
  
  segments.forEach(seg => {
    // Pattern 1: 动作名-重量kg×次数×组数  or  动作名 重量×次数 三组
    // Examples: "引体向上辅助-25kg×8三组完成", "高位下拉50×12三组", "深蹲85×10四组"
    // Name can contain Chinese chars, letters, hyphens, spaces up to first digit or separator
    const p1 = seg.match(/^(.+?)[\s\-]*?(\d+(?:\.\d+)?)\s*(?:kg|公斤)?\s*[×xX*]\s*(\d+)\s*(?:[×xX*]\s*(\d+))?\s*(?:[两三四五六七八九十百]?[组套])?/);
    if (p1) {
      const rawName = p1[1].replace(/做了|完成了|练了|今天|然后|接着|最后/g, '').trim();
      if (rawName.length >= 1 && rawName.length <= 15) {
        const setsFromChinese = seg.match(/([两三四五六七八九十])组/);
        const chineseNum = {'两':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10};
        const sets = p1[4] ? parseInt(p1[4]) : setsFromChinese ? (chineseNum[setsFromChinese[1]] || 3) : 3;
        exercises.push({ name: rawName, weight: parseFloat(p1[2]), reps: parseInt(p1[3]), sets, notes: '' });
        return;
      }
    }
    
    // Pattern 2: 动作名 + 描述性参数 (如 "离心引体5秒控制×4两组")
    // Handles tempo/time-based exercises: name + duration/description + ×count + 组
    const p2 = seg.match(/^(.+?)(\d+)\s*(?:秒|s)\s*(?:控制|保持|停顿)?\s*[×xX*]\s*(\d+)\s*(?:[两三四五六七八九十]?[组套])?/);
    if (p2) {
      const rawName = p2[1].replace(/做了|完成了|练了|今天|然后|接着|最后/g, '').trim();
      if (rawName.length >= 1 && rawName.length <= 15) {
        const setsFromChinese = seg.match(/([两三四五六七八九十])组/);
        const chineseNum = {'两':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10};
        const sets = setsFromChinese ? (chineseNum[setsFromChinese[1]] || 3) : 3;
        exercises.push({ name: rawName, weight: 0, reps: parseInt(p2[3]), sets, tempo: p2[2] + '秒', notes: seg });
        return;
      }
    }
    
    // Pattern 3: Simple "动作 重量 次数 组"
    const p3 = seg.match(/^(.+?)\s+(\d+(?:\.\d+)?)\s*(?:kg|公斤)?\s+(\d+)\s*(?:次|个|rep)?\s+(\d+)\s*(?:组|set)/i);
    if (p3) {
      const rawName = p3[1].trim();
      if (rawName.length >= 1 && rawName.length <= 15 && !exercises.find(e => e.name === rawName)) {
        exercises.push({ name: rawName, weight: parseFloat(p3[2]), reps: parseInt(p3[3]), sets: parseInt(p3[4]), notes: '' });
        return;
      }
    }
    
    // Pattern 4: "动作 做了/完成 N个/次" (no weight)
    const p4 = seg.match(/^(.+?)\s*(?:做了|完成了?)?\s*(\d+)\s*(?:个|次|rep)/);
    if (p4 && !exercises.find(e => seg.startsWith(e.name))) {
      const rawName = p4[1].replace(/做了|完成了|练了|今天|然后|接着|最后/g, '').trim();
      if (rawName.length >= 2 && rawName.length <= 15) {
        exercises.push({ name: rawName, weight: 0, reps: parseInt(p4[2]), sets: 1, notes: '' });
      }
    }
  });
  
  // Decision detection
  const decisionKeywords = {
    'load_adjustment': ['加了', '减了', '加重', '减重', '加到', '降到', '维持'],
    'exercise_swap': ['换成', '改做', '替换', '换了'],
    'pain_response': ['疼', '痛', '不适', '不舒服', '膝盖', '腰', '肩', '手腕'],
    'fatigue_management': ['累', '没力', '力竭', '休息', '太疲劳'],
    'exercise_termination': ['没做', '跳过', '取消', '放弃', '不做了'],
    'form_correction': ['纠正', '调整', '角度', '姿势', '幅度']
  };
  
  for (const [type, keywords] of Object.entries(decisionKeywords)) {
    for (const kw of keywords) {
      if (text.includes(kw)) {
        decisions.push({
          session_phase: 'main_training',
          decision_type: type,
          trigger_category: type.includes('pain') ? 'verbal_feedback' : 'observation',
          observation: text,
          decision: text,
          impact_level: type === 'pain_response' ? 'significant' : 'notable',
          confidence: 0.6
        });
        break; // One decision per type per text
      }
    }
  }
  
  return { exercises, decisions };
}

function extractTags(text) {
  const tags = [];
  const bodyParts = ['膝盖', '腰', '肩', '背', '腿', '胸', '手臂', '手腕', '脖子', '臀'];
  const states = ['不错', '很好', '一般', '差', '累', '精神好'];
  bodyParts.forEach(p => { if (text.includes(p)) tags.push(p); });
  states.forEach(s => { if (text.includes(s)) tags.push(s); });
  return tags;
}

}

// --- Helpers ---
function formatDate(d) {
  if (!d) return '—';
  const date = new Date(d);
  return `${date.getMonth()+1}/${date.getDate()}`;
}

function formatTime(d) {
  if (!d) return '';
  const date = new Date(d);
  return `${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')}`;
}

function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '...' : s; }

function statusLabel(s) {
  return { planned: '计划中', in_progress: '进行中', completed: '已完成', cancelled: '已取消' }[s] || s;
}

function storylineStatusLabel(s) {

function getWarnings(member, sessions, data) {
  const warnings = [];
  if (sessions.length >= 2) {
    const recent = sessions.sort((a,b) => (b.scheduled_at||'').localeCompare(a.scheduled_at||'')).slice(0, 3);
    // Check consecutive discomfort
    const discomfortSessions = recent.filter(s => s.post_discomforts?.length > 0);
    if (discomfortSessions.length >= 2) {
      warnings.push('连续不适记录');
    }
  }
  // Check attendance gap
  if (sessions.length > 0) {
    const lastDate = new Date(sessions.sort((a,b) => (b.scheduled_at||'').localeCompare(a.scheduled_at||''))[0].scheduled_at);
    const daysSince = Math.floor((Date.now() - lastDate.getTime()) / 86400000);
    if (daysSince > 14) warnings.push(`${daysSince}天未上课`);
  }
  return warnings;
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    // For large files, just store a placeholder
    if (file.size > 5 * 1024 * 1024) {
      resolve(`data:${file.type};placeholder,${file.name}`);
    } else {
      reader.readAsDataURL(file);
    }
  });
}

function viewMedia(mediaId) {
  const ma = STATE.data.mediaAssets.find(m => m.id === mediaId);
  if (!ma) return;
  if (ma.oss_url) {
    window.open(ma.oss_url, '_blank');
  }
}
